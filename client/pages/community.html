<title>Community - Margadarshak AI</title>

<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>

<body>

<div class="app-container">

<!-- Sidebar -->

<div class="sidebar">

<div class="sidebar-header">
<img src="../assets/Logo.jpeg" class="logo-img">
<h3>Margadarshak AI</h3>
</div>

<div class="sidebar-nav">

<a href="dashboard.html" class="nav-item">Dashboard</a>
<a href="assessment.html" class="nav-item">Assessment</a>
<a href="tracker.html" class="nav-item">Tracker</a>
<a href="roadmap.html" class="nav-item">Roadmap</a>
<a href="resume.html" class="nav-item">Resume</a>
<a href="interview.html" class="nav-item">Interview</a>
<a href="mentor.html" class="nav-item">English Mentor</a>
<a href="teams.html" class="nav-item">Teams</a>
<a href="community.html" class="nav-item active">Community</a>
<a href="profile.html" class="nav-item">Profile</a>

</div>

</div>


<!-- Main Content -->

<div class="main-content">

<!-- Top Navbar -->

<div class="top-navbar">

<h2>Community</h2>

<div>

<button class="btn btn-secondary" onclick="window.location.href='settings.html'">
Settings
</button>

<button class="btn btn-danger" onclick="logout()">
Logout
</button>

</div>

</div>


<!-- Create Post -->

<div class="glass-card animate-fade-in">

<h3>Share your progress</h3>

<textarea 
id="postInput"
placeholder="Share your career progress..."
style="margin-top:10px;height:80px"
></textarea>

<button 
class="btn btn-primary"
style="margin-top:10px"
onclick="createPost()"
>

<i class="fas fa-paper-plane"></i>
Post

</button>

</div>


<!-- Posts -->

<div 
id="postsContainer"
class="dashboard-grid"
style="margin-top:20px"
>

</div>

</div>

</div>

<script src="../js/layout.js"></script>
<script src="../js/community.js"></script>

<script>

function logout(){

localStorage.removeItem("token")
window.location.href="login.html"

}

</script>

</body>
</html>
