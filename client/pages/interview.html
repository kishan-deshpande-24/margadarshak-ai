<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../css/style.css">
<script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

<div class="app-container">

<div class="sidebar">
<div class="sidebar-header">
<img src="../assets/Logo.jpeg" class="logo-img">
<h3>Margadarshak AI</h3>
</div>

<div class="sidebar-nav">
<a href="dashboard.html" class="nav-item">Dashboard</a>
<a href="resume.html" class="nav-item">Resume</a>
<a href="interview.html" class="nav-item active">Interview</a>
</div>
</div>

<div class="main-content">

<h2>FAANG AI Interview</h2>

<button onclick="endInterview()" class="btn btn-danger">
End Interview
</button>

<div id="setupScreen" class="glass-card">

<select id="roleSelect">
<option>Frontend Developer</option>
<option>Backend Developer</option>
<option>Full Stack Developer</option>
</select>

<button onclick="startInterview()" class="btn btn-primary">
Start Interview
</button>

</div>

<div id="interviewRoom" style="display:none">

<div class="dashboard-grid">

<div class="glass-card">
<video id="camera" autoplay muted style="width:100%"></video>
</div>

<div class="glass-card">
<h3>AI Interviewer</h3>
<div id="avatar" class="avatar"></div>
<div id="question"></div>
</div>

</div>

</div>

<!-- CODING -->
<div id="codingRound" style="display:none">
<div class="glass-card">
<h3>Coding Round</h3>
<div id="codingQuestion"></div>
<textarea id="codeEditor"></textarea>
<button onclick="runCode()">Run</button>
<button onclick="submitCode()">Submit</button>
<pre id="output"></pre>
</div>
</div>

<!-- WHITEBOARD -->
<div id="whiteboardRound" style="display:none">
<canvas id="board" width="600" height="400"></canvas>
<button onclick="clearBoard()">Clear</button>
<button onclick="continueInterview()">Continue</button>
</div>

<div id="resultScreen" style="display:none">
<h2 id="score"></h2>
<div id="feedback"></div>
</div>

</div>
</div>

<script src="../js/interview.js"></script>
<script>lucide.createIcons()</script>

</body>
</html>
