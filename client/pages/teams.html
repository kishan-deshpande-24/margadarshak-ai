<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Team Finder - Margadarshak AI</title>

<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>

<body>

<div class="app-container">

<!-- Sidebar -->

<div class="sidebar">

<div class="sidebar-header">
<img src="../assets/Logo.jpeg" class="logo-img">
<h3>Margadarshak AI</h3>
</div>

<div class="sidebar-nav">

<a href="dashboard.html" class="nav-item">Dashboard</a>
<a href="assessment.html" class="nav-item">Assessment</a>
<a href="tracker.html" class="nav-item">Tracker</a>
<a href="roadmap.html" class="nav-item">Roadmap</a>
<a href="resume.html" class="nav-item">Resume</a>
<a href="interview.html" class="nav-item">Interview</a>
<a href="mentor.html" class="nav-item">English Mentor</a>
<a href="teams.html" class="nav-item active">Teams</a>
<a href="community.html" class="nav-item">Community</a>
<a href="profile.html" class="nav-item">Profile</a>

</div>

</div>


<!-- Main Content -->

<div class="main-content">

<!-- Top Navbar -->

<div class="top-navbar">

<h2>Team Finder</h2>

<div>

<button 
class="btn btn-primary"
onclick="showCreateTeam()"
>

Create Team

</button>

</div>

</div>


<!-- Create Team -->

<div 
id="createTeam"
class="glass-card"
style="display:none"
>

<h3>Create New Team</h3>

<input 
type="text"
id="teamName"
placeholder="Team Name"
style="margin-top:10px"
>

<textarea 
id="teamDesc"
placeholder="Team Description"
style="margin-top:10px"
></textarea>

<input 
type="text"
id="teamSkills"
placeholder="Required Skills (comma separated)"
style="margin-top:10px"
>

<button 
class="btn btn-primary"
style="margin-top:15px"
onclick="createTeam()"
>

Create

</button>

</div>


<!-- Teams List -->

<div 
id="teamsContainer"
class="dashboard-grid"
style="margin-top:20px"
>

</div>

</div>

</div>

<script src="../js/layout.js"></script>
<script src="../js/team.js"></script>

<script>

function showCreateTeam(){

document.getElementById("createTeam").style.display="block"

}

</script>

</body>
</html>
