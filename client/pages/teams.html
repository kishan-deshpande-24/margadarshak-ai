<!-- ================= MAIN ================= -->
<div class="main-content">

<h2>Teams</h2>

<!-- CREATE -->
<div class="glass-card">
<input id="teamName" placeholder="Team name">
<button onclick="createTeam()" class="btn btn-primary">Create</button>
</div>

<!-- JOIN -->
<div class="glass-card" style="margin-top:15px">
<input id="inviteCode" placeholder="Enter invite code">
<button onclick="joinTeam()" class="btn btn-primary">Join</button>
</div>

<!-- TEAMS LIST -->
<div id="teamsList" style="margin-top:20px"></div>

<!-- ANALYTICS -->
<div class="glass-card" style="margin-top:20px">
<h3>Analytics</h3>
<div id="analytics"></div>
</div>

<!-- CHAT -->
<div class="glass-card" style="margin-top:20px">
<h3>Chat</h3>
<div id="chatBox" style="height:200px;overflow:auto"></div>

<input id="messageInput" placeholder="Type message">
<button onclick="sendMessage()" class="btn btn-primary">Send</button>
</div>

</div>

</div>
