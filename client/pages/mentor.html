<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>English Mentor - Margadarshak AI</title>

<link rel="stylesheet" href="../css/style.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="app-container">

<!-- Sidebar -->

<div class="sidebar">

<div class="sidebar-header">
<img src="../assets/Logo.jpeg" class="logo-img">
<h3>Margadarshak AI</h3>
</div>

<div class="sidebar-nav">

<a href="dashboard.html" class="nav-item">Dashboard</a>
<a href="assessment.html" class="nav-item">Assessment</a>
<a href="tracker.html" class="nav-item">Tracker</a>
<a href="roadmap.html" class="nav-item">Roadmap</a>
<a href="resume.html" class="nav-item">Resume</a>
<a href="interview.html" class="nav-item">Interview</a>
<a href="mentor.html" class="nav-item active">English Mentor</a>
<a href="teams.html" class="nav-item">Teams</a>
<a href="community.html" class="nav-item">Community</a>
<a href="profile.html" class="nav-item">Profile</a>

</div>

</div>


<!-- Main Content -->

<div class="main-content">

<!-- Top Navbar -->

<div class="top-navbar">

<h2>AI English Mentor</h2>

<div>

<button class="btn btn-secondary" onclick="window.location.href='settings.html'">
Settings
</button>

<button class="btn btn-danger" onclick="logout()">
Logout
</button>

</div>

</div>


<!-- Mentor Grid -->

<div class="dashboard-grid">

<!-- Live Chat -->

<div class="glass-card mentor-chat-card">

<h3>Live Conversation</h3>

<div id="mentorChat" class="mentor-chat"></div>

<div id="voiceAnimation" class="voice-animation" style="display:none"></div>

<div class="mentor-input">

<input 
type="text"
id="mentorInput"
placeholder="Speak or type..."
>

<button class="btn btn-primary" onclick="sendMessage()">
Send
</button>

<button class="btn btn-secondary" onclick="startVoice()">
🎤 Speak
</button>

</div>

</div>


<!-- Right Panel -->

<div class="mentor-right">

<!-- Mock Interview -->

<div class="glass-card">

<h3>AI Speaking Interview</h3>

<p>
Practice English speaking interview
</p>

<button 
class="btn btn-primary"
onclick="startInterview()"
>

Start Interview

</button>

</div>


<!-- Daily Challenge -->

<div class="glass-card">

<h3>Daily Speaking Challenge</h3>

<div id="dailyChallenge">

Loading...

</div>

<button 
class="btn btn-secondary"
onclick="loadChallenge()"
>

Refresh

</button>

</div>


<!-- Speaking Progress -->

<div class="glass-card">

<h3>Speaking Progress</h3>

<canvas id="speakingChart"></canvas>

</div>

</div>

</div>

</div>

</div>

<script src="../js/layout.js"></script>
<script src="../js/mentor.js"></script>

<script>

function logout(){

localStorage.removeItem("token")
window.location.href="login.html"

}

loadChallenge()

</script>

</body>
</html>
