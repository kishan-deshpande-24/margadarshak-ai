<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Margadarshak AI</title>
<link rel="stylesheet" href="/css/global.css">
<style>
body { display:flex; align-items:center; justify-content:center; min-height:100vh; background: radial-gradient(ellipse at 30% 50%, rgba(16,185,129,0.08) 0%, transparent 50%), radial-gradient(ellipse at 70% 20%, rgba(59,130,246,0.06) 0%, transparent 50%), var(--bg-primary); }
.auth-box { width:100%; max-width:440px; padding:40px; animation: fadeUp .5s ease; }
.auth-logo { text-align:center; margin-bottom:32px; }
.auth-logo-icon { width:56px; height:56px; background:var(--gradient); border-radius:16px; display:inline-flex; align-items:center; justify-content:center; font-size:28px; margin-bottom:12px; }
.auth-title { font-size:26px; font-weight:800; text-align:center; margin-bottom:8px; }
.auth-sub { text-align:center; color:var(--text-muted); font-size:14px; margin-bottom:32px; }
.divider { display:flex; align-items:center; gap:12px; margin:20px 0; }
.divider::before,.divider::after { content:''; flex:1; height:1px; background:var(--border); }
.divider span { font-size:12px; color:var(--text-muted); }
.google-btn { width:100%; display:flex; align-items:center; justify-content:center; gap:10px; padding:12px; background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); color:var(--text-primary); font-size:14px; font-weight:500; cursor:pointer; transition:all .2s; text-decoration:none; }
.google-btn:hover { border-color:var(--blue); background:rgba(59,130,246,0.05); }
</style>
</head>
<body>
<div class="card auth-box">
  <div class="auth-logo">
    <div class="auth-logo-icon">🧭</div>
    <div style="font-size:13px;color:var(--text-muted)">Margadarshak AI</div>
  </div>
  <h1 class="auth-title">Welcome Back</h1>
  <p class="auth-sub">Sign in to continue your career journey</p>

  <div id="alertBox"></div>

  <a href="https://margadarshak-ai-zn3r.onrender.com/api/auth/google" class="google-btn">
    <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Continue with Google
  </a>

  <div class="divider"><span>or sign in with email</span></div>

  <form id="loginForm">
    <div class="form-group">
      <label class="form-label">Email or Phone</label>
      <input class="form-input" id="identifier" type="text" placeholder="you@email.com or +91..." required>
    </div>
    <div class="form-group">
      <label class="form-label" style="display:flex;justify-content:space-between">
        Password
        <a href="/pages/forgot-password.html" style="font-size:12px">Forgot password?</a>
      </label>
      <input class="form-input" id="password" type="password" placeholder="••••••••" required>
    </div>
    <button class="btn btn-primary" type="submit" id="loginBtn" style="width:100%;justify-content:center">Sign In</button>
  </form>

  <p style="text-align:center;font-size:14px;color:var(--text-muted);margin-top:24px">
    Don't have an account? <a href="/pages/signup.html">Create one free</a>
  </p>
</div>

<script src="/js/app.js"></script>
<script>
Auth.requireGuest();

(function showAuthError(){
  const err = new URLSearchParams(window.location.search).get('error');
  if (!err) return;
  const msg = err === 'google_unavailable'
    ? 'Google sign-in is not available right now. Please sign in with email.'
    : 'Google sign-in failed. Please try again or use email.';
  document.getElementById('alertBox').innerHTML = `<div class="alert alert-error">${msg}</div>`;
})();

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const alertBox = document.getElementById('alertBox');
  alertBox.innerHTML = '';
  setLoading(btn, true);

  const data = await post('/auth/login', {
    identifier: document.getElementById('identifier').value.trim(),
    password: document.getElementById('password').value
  });

  setLoading(btn, false, 'Sign In');

  if (data.success) {
    Auth.setSession(data.token, data.user);
    toast('Welcome back! 🎉', 'success');
    setTimeout(() => {
      window.location.href = data.user.onboardingCompleted ? '/pages/dashboard.html' : '/pages/onboarding.html';
    }, 500);
  } else {
    alertBox.innerHTML = `<div class="alert alert-error">${data.message}</div>`;
    if (data.userId) {
      alertBox.innerHTML += `<div class="alert alert-info">Need to verify? <a href="/pages/signup.html?verify=${data.userId}">Resend verification</a></div>`;
    }
  }
});
</script>
</body>
</html>
