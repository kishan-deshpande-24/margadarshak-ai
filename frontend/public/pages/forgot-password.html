<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Forgot Password — Margadarshak AI</title>
<link rel="stylesheet" href="/css/global.css">
<style>body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg-primary)}</style>
</head>
<body>
<div class="card" style="width:100%;max-width:420px;padding:40px;animation:fadeUp .5s ease">
  <div style="text-align:center;margin-bottom:28px">
    <div style="font-size:48px;margin-bottom:12px">🔐</div>
    <h1 style="font-size:22px;font-weight:800">Reset Password</h1>
    <p style="color:var(--text-muted);font-size:14px;margin-top:6px">Enter your email to receive a reset OTP</p>
  </div>
  <div id="alertBox"></div>

  <div id="step1">
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input class="form-input" id="emailInput" type="email" placeholder="you@email.com" required>
    </div>
    <button class="btn btn-primary" style="width:100%;justify-content:center" id="sendBtn" onclick="sendOTP()">Send Reset OTP</button>
  </div>

  <div id="step2" style="display:none">
    <p style="font-size:13px;color:var(--text-muted);margin-bottom:20px;text-align:center">Enter the 6-digit OTP sent to your email</p>
    <div class="form-group">
      <label class="form-label">OTP Code</label>
      <input class="form-input" id="otpInput" placeholder="123456" maxlength="6" style="text-align:center;font-size:22px;letter-spacing:8px">
    </div>
    <div class="form-group">
      <label class="form-label">New Password</label>
      <input class="form-input" id="newPass" type="password" placeholder="Min 8 characters">
    </div>
    <div class="form-group">
      <label class="form-label">Confirm Password</label>
      <input class="form-input" id="confirmPass" type="password" placeholder="Re-enter new password">
    </div>
    <button class="btn btn-primary" style="width:100%;justify-content:center" id="resetBtn" onclick="resetPassword()">Reset Password</button>
  </div>

  <p style="text-align:center;font-size:13px;color:var(--text-muted);margin-top:20px"><a href="/pages/login.html">← Back to Login</a></p>
</div>

<script src="/js/app.js"></script>
<script>
let userId = null;
async function sendOTP() {
  const email = document.getElementById('emailInput').value.trim();
  if (!email) return;
  const btn = document.getElementById('sendBtn');
  setLoading(btn, true);
  const data = await post('/auth/forgot-password', { email });
  setLoading(btn, false, 'Send Reset OTP');
  if (data.success) {
    userId = data.userId;
    document.getElementById('step1').style.display = 'none';
    document.getElementById('step2').style.display = 'block';
    toast('OTP sent to your email', 'success');
  } else {
    document.getElementById('alertBox').innerHTML = `<div class="alert alert-error">${data.message}</div>`;
  }
}
async function resetPassword() {
  const otp = document.getElementById('otpInput').value.trim();
  const newPass = document.getElementById('newPass').value;
  const confirmPass = document.getElementById('confirmPass').value;
  if (newPass !== confirmPass) return toast('Passwords do not match', 'error');
  if (newPass.length < 8) return toast('Password must be at least 8 characters', 'error');
  const btn = document.getElementById('resetBtn');
  setLoading(btn, true);
  const data = await post('/auth/reset-password', { userId, otp, newPassword: newPass });
  setLoading(btn, false, 'Reset Password');
  if (data.success) {
    toast('Password reset! Please login.', 'success');
    setTimeout(() => window.location.href = '/pages/login.html', 1200);
  } else {
    toast(data.message, 'error');
  }
}
</script>
</body>
</html>
