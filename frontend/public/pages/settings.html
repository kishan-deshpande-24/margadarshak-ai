<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Settings — Margadarshak AI</title><link rel="stylesheet" href="/css/global.css"></head>
<body>
<div class="app-layout">
  <div id="sidebar-container"></div>
  <div class="main-content">
    <div class="topbar" id="topbar"></div>
    <div class="page-content">
      <h1 style="font-size:24px;font-weight:800;margin-bottom:8px">Settings</h1>
      <p style="font-size:14px;margin-bottom:28px">Manage your account preferences</p>

      <!-- Change Password -->
      <div class="card" style="padding:28px;margin-bottom:24px">
        <h3 style="font-size:16px;font-weight:700;margin-bottom:20px">🔐 Change Password</h3>
        <div id="pwAlertBox"></div>
        <div class="form-group">
          <label class="form-label">Current Password</label>
          <input class="form-input" id="currentPass" type="password" placeholder="Enter current password">
        </div>
        <div class="form-group">
          <label class="form-label">New Password</label>
          <input class="form-input" id="newPass" type="password" placeholder="Min 8 characters">
        </div>
        <div class="form-group">
          <label class="form-label">Confirm New Password</label>
          <input class="form-input" id="confirmPass" type="password" placeholder="Re-enter new password">
        </div>
        <button class="btn btn-primary" id="changePwBtn" onclick="changePassword()">Update Password</button>
      </div>

      <!-- Notifications -->
      <div class="card" style="padding:28px;margin-bottom:24px">
        <h3 style="font-size:16px;font-weight:700;margin-bottom:20px">🔔 Notification Preferences</h3>
        <div id="notifPrefs">
          <div class="skeleton" style="height:40px;margin-bottom:10px"></div>
          <div class="skeleton" style="height:40px;margin-bottom:10px"></div>
          <div class="skeleton" style="height:40px"></div>
        </div>
      </div>

      <!-- Danger Zone -->
      <div class="card" style="padding:28px;border-color:rgba(239,68,68,0.3)">
        <h3 style="font-size:16px;font-weight:700;margin-bottom:12px;color:var(--red)">⚠️ Danger Zone</h3>
        <p style="font-size:14px;color:var(--text-muted);margin-bottom:16px">Permanently delete your account and all associated data. This action cannot be undone.</p>
        <button class="btn btn-danger" onclick="confirmDelete()">Delete My Account</button>
      </div>
    </div>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
initPage('settings', 'Settings');

async function loadNotifPrefs() {
  const data = await get('/users/me');
  if (!data.success) return;
  const prefs = data.user.notificationPrefs || { email: true, browser: true };
  document.getElementById('notifPrefs').innerHTML = `
    <label style="display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer">
      <div><div style="font-size:14px;font-weight:500">Email Notifications</div><div style="font-size:12px;color:var(--text-muted)">Receive updates via email</div></div>
      <input type="checkbox" id="emailNotif" ${prefs.email !== false ? 'checked' : ''} style="accent-color:var(--green);width:18px;height:18px;cursor:pointer" onchange="saveNotifPref()">
    </label>
    <label style="display:flex;align-items:center;justify-content:space-between;padding:12px 0;cursor:pointer">
      <div><div style="font-size:14px;font-weight:500">Browser Notifications</div><div style="font-size:12px;color:var(--text-muted)">Get notified in your browser</div></div>
      <input type="checkbox" id="browserNotif" ${prefs.browser !== false ? 'checked' : ''} style="accent-color:var(--green);width:18px;height:18px;cursor:pointer" onchange="saveNotifPref()">
    </label>`;
}

async function saveNotifPref() {
  await put('/users/profile', { notificationPrefs: { email: document.getElementById('emailNotif')?.checked, browser: document.getElementById('browserNotif')?.checked } });
  toast('Preferences saved', 'success');
}

async function changePassword() {
  const current = document.getElementById('currentPass').value;
  const newPass = document.getElementById('newPass').value;
  const confirm = document.getElementById('confirmPass').value;
  const alertBox = document.getElementById('pwAlertBox');
  alertBox.innerHTML = '';
  if (!current || !newPass) return alertBox.innerHTML = `<div class="alert alert-error">Please fill all fields</div>`;
  if (newPass.length < 8) return alertBox.innerHTML = `<div class="alert alert-error">Password must be at least 8 characters</div>`;
  if (newPass !== confirm) return alertBox.innerHTML = `<div class="alert alert-error">Passwords do not match</div>`;
  const btn = document.getElementById('changePwBtn');
  setLoading(btn, true);
  const data = await post('/auth/change-password', { currentPassword: current, newPassword: newPass });
  setLoading(btn, false, 'Update Password');
  if (data.success) {
    toast('Password updated successfully', 'success');
    document.getElementById('currentPass').value = '';
    document.getElementById('newPass').value = '';
    document.getElementById('confirmPass').value = '';
  } else {
    alertBox.innerHTML = `<div class="alert alert-error">${escapeHtml(data.message)}</div>`;
  }
}

function confirmDelete() {
  if (confirm('Are you sure? This will permanently delete your account and all data. This cannot be undone.')) {
    deleteAccount();
  }
}

async function deleteAccount() {
  const data = await del('/users/me');
  if (data.success) {
    Auth.clear();
    toast('Account deleted', 'info');
    setTimeout(() => window.location.href = '/', 800);
  } else {
    toast(data.message || 'Failed to delete account', 'error');
  }
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

loadNotifPrefs();
</script>
</body>
</html>
