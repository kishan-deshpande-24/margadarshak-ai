<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Notifications — Margadarshak AI</title><link rel="stylesheet" href="/css/global.css"></head>
<body>
<div class="app-layout">
  <div id="sidebar-container"></div>
  <div class="main-content">
    <div class="topbar" id="topbar"></div>
    <div class="page-content">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px">
        <h1 style="font-size:24px;font-weight:800">Notifications</h1>
        <button class="btn btn-secondary btn-sm" onclick="markAllRead()">✓ Mark All Read</button>
      </div>
      <div id="notifList"><div class="skeleton" style="height:64px;margin-bottom:8px"></div><div class="skeleton" style="height:64px;margin-bottom:8px"></div><div class="skeleton" style="height:64px"></div></div>
    </div>
  </div>
</div>
<script src="/js/app.js"></script>
<script>
initPage('','Notifications');
const ICONS={badge:'🏅',interview:'🎤',team:'🤝',community:'💬',system:'⚙️',reminder:'⏰'};
async function loadNotifications(){
  const data=await get('/notifications');
  if(!data.success)return;
  document.getElementById('notifList').innerHTML=data.notifications.length?data.notifications.map(n=>`
    <div class="card" style="padding:16px;margin-bottom:8px;display:flex;gap:14px;align-items:center;cursor:pointer;opacity:${n.read?0.6:1}" onclick="markRead('${n._id}',this)" ${n.link?`data-link="${n.link}"`:''}><div style="width:40px;height:40px;border-radius:50%;background:rgba(16,185,129,0.1);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">${ICONS[n.type]||'🔔'}</div>
      <div style="flex:1"><div style="font-size:14px;font-weight:${n.read?'400':'600'}">${n.title}</div><div style="font-size:12px;color:var(--text-muted)">${n.message||''} · ${timeAgo(n.createdAt)}</div></div>
      ${!n.read?'<div style="width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0"></div>':''}
    </div>`).join(''):'<div style="text-align:center;padding:60px"><div style="font-size:48px;margin-bottom:12px">🔔</div><p style="color:var(--text-muted)">No notifications yet</p></div>';
}
async function markRead(id,el){
  await put('/notifications/read',{ids:[id]});
  el.style.opacity=0.6;el.querySelector('[style*="background:var(--green)"]')?.remove();
  if(el.dataset.link)window.location.href=el.dataset.link;
}
async function markAllRead(){
  await put('/notifications/read-all',{});
  toast('All marked as read','success');loadNotifications();
}
loadNotifications();
</script></body></html>
