<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Setup Profile — Margadarshak AI</title>
<link rel="stylesheet" href="/css/global.css">
<style>
body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; background:radial-gradient(ellipse at 50% 0%, rgba(16,185,129,0.1) 0%, transparent 60%), var(--bg-primary); }
.onboarding-box { width:100%; max-width:560px; }
.progress-steps { display:flex; align-items:center; margin-bottom:40px; }
.step-node { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:700; transition:all .3s; flex-shrink:0; }
.step-node.done { background:var(--gradient); color:#fff; }
.step-node.active { background:transparent; border:2px solid var(--green); color:var(--green); }
.step-node.pending { background:var(--bg-card); border:1px solid var(--border); color:var(--text-muted); }
.step-line { flex:1; height:2px; background:var(--border); margin:0 4px; transition:background .3s; }
.step-line.done { background:var(--green); }
.chip-select { display:flex; flex-wrap:wrap; gap:10px; }
.chip { padding:8px 18px; border-radius:100px; font-size:13px; font-weight:500; cursor:pointer; border:1px solid var(--border); color:var(--text-secondary); transition:all .2s; }
.chip:hover { border-color:var(--green); color:var(--green); }
.chip.selected { background:rgba(16,185,129,0.15); border-color:var(--green); color:var(--green); }
</style>
</head>
<body>
<div class="card onboarding-box" style="padding:40px">
  <div style="text-align:center;margin-bottom:32px">
    <div style="font-size:48px;margin-bottom:8px" id="stepEmoji">🎯</div>
    <h1 style="font-size:24px;font-weight:800" id="stepTitle">Let's set up your profile</h1>
    <p style="color:var(--text-muted);font-size:14px;margin-top:6px" id="stepSub">Step 1 of 5</p>
  </div>

  <div class="progress-steps" id="progressSteps">
    <div class="step-node active" id="sn1">1</div>
    <div class="step-line" id="sl1"></div>
    <div class="step-node pending" id="sn2">2</div>
    <div class="step-line" id="sl2"></div>
    <div class="step-node pending" id="sn3">3</div>
    <div class="step-line" id="sl3"></div>
    <div class="step-node pending" id="sn4">4</div>
    <div class="step-line" id="sl4"></div>
    <div class="step-node pending" id="sn5">✓</div>
  </div>

  <div id="stepContent"></div>

  <div style="display:flex;gap:12px;margin-top:32px">
    <button class="btn btn-secondary" id="backBtn" onclick="prevStep()" style="display:none">← Back</button>
    <button class="btn btn-primary" id="nextBtn" onclick="nextStep()" style="flex:1;justify-content:center">Continue →</button>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
if (!Auth.requireAuth()) throw '';

const steps = [
  { emoji:'🛠️', title:'What are your skills?', sub:'Step 1 of 5 — Select all that apply' },
  { emoji:'💡', title:'What are your interests?', sub:'Step 2 of 5 — Choose your domains' },
  { emoji:'🎯', title:'What\'s your career goal?', sub:'Step 3 of 5 — Where do you want to go?' },
  { emoji:'🏢', title:'Target companies', sub:'Step 4 of 5 — Which companies excite you?' },
  { emoji:'🚀', title:'All set!', sub:'Step 5 of 5 — Generating your roadmap...' }
];

const options = {
  skills: ['JavaScript','Python','Java','React','Node.js','Machine Learning','Data Science','C++','AWS','Flutter','SQL','DevOps','Figma','Product Management','Marketing','Excel','Swift','Kotlin','Go','Rust','TypeScript','Vue.js'],
  interests: ['Software Engineering','Data Science','Product Management','UI/UX Design','Cybersecurity','Cloud Computing','AI/ML','Mobile Development','DevOps','Blockchain','Game Development','Finance','Marketing','Entrepreneurship','Research'],
  companies: ['Google','Amazon','Microsoft','Meta','Apple','Netflix','Adobe','Salesforce','Uber','Airbnb','Infosys','TCS','Wipro','Zoho','Paytm','Flipkart','Startups','MNCs'],
};

let currentStep = 1;
const data = { skills:[], interests:[], careerGoal:'', experience:'fresher', targetCompanies:[] };

function renderStep() {
  const info = steps[currentStep - 1];
  document.getElementById('stepEmoji').textContent = info.emoji;
  document.getElementById('stepTitle').textContent = info.title;
  document.getElementById('stepSub').textContent = info.sub;
  document.getElementById('backBtn').style.display = currentStep > 1 ? 'block' : 'none';
  document.getElementById('nextBtn').textContent = currentStep === 5 ? 'Go to Dashboard 🎉' : 'Continue →';

  // Update step nodes
  for (let i = 1; i <= 5; i++) {
    const node = document.getElementById(`sn${i}`);
    const line = document.getElementById(`sl${i}`);
    node.className = 'step-node ' + (i < currentStep ? 'done' : i === currentStep ? 'active' : 'pending');
    if (i < 5 && line) line.className = 'step-line ' + (i < currentStep ? 'done' : '');
  }

  const content = document.getElementById('stepContent');
  if (currentStep === 1) {
    content.innerHTML = `<div class="chip-select">${options.skills.map(s => `<div class="chip ${data.skills.includes(s)?'selected':''}" onclick="toggleChip(this,'skills','${s}')">${s}</div>`).join('')}</div>`;
  } else if (currentStep === 2) {
    content.innerHTML = `<div class="chip-select">${options.interests.map(s => `<div class="chip ${data.interests.includes(s)?'selected':''}" onclick="toggleChip(this,'interests','${s}')">${s}</div>`).join('')}</div>`;
  } else if (currentStep === 3) {
    content.innerHTML = `
      <div class="form-group">
        <label class="form-label">Career Goal</label>
        <input class="form-input" id="careerGoalInput" placeholder="e.g. Become a Senior Software Engineer at Google" value="${data.careerGoal}">
      </div>
      <div class="form-group">
        <label class="form-label">Experience Level</label>
        <select class="form-select" id="experienceInput">
          <option value="fresher" ${data.experience==='fresher'?'selected':''}>Fresher (0-1 year)</option>
          <option value="junior" ${data.experience==='junior'?'selected':''}>Junior (1-3 years)</option>
          <option value="mid" ${data.experience==='mid'?'selected':''}>Mid-level (3-5 years)</option>
          <option value="senior" ${data.experience==='senior'?'selected':''}>Senior (5+ years)</option>
        </select>
      </div>`;
  } else if (currentStep === 4) {
    content.innerHTML = `<div class="chip-select">${options.companies.map(s => `<div class="chip ${data.targetCompanies.includes(s)?'selected':''}" onclick="toggleChip(this,'targetCompanies','${s}')">${s}</div>`).join('')}</div>`;
  } else if (currentStep === 5) {
    content.innerHTML = `
      <div style="text-align:center;padding:20px">
        <div style="width:64px;height:64px;background:var(--gradient);border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:16px;animation:glow 2s infinite">🎉</div>
        <p style="color:var(--text-secondary);font-size:15px;line-height:1.7">Your profile is set up! Click below to go to your dashboard and start your AI-powered career journey.</p>
        <div style="margin-top:20px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
          ${data.skills.slice(0,4).map(s=>`<span class="tag tag-green">${s}</span>`).join('')}
        </div>
      </div>`;
  }
}

function toggleChip(el, key, val) {
  el.classList.toggle('selected');
  const arr = data[key];
  const idx = arr.indexOf(val);
  if (idx > -1) arr.splice(idx, 1); else arr.push(val);
}

async function nextStep() {
  const btn = document.getElementById('nextBtn');
  if (currentStep === 3) {
    data.careerGoal = document.getElementById('careerGoalInput')?.value.trim() || '';
    data.experience = document.getElementById('experienceInput')?.value || 'fresher';
    if (!data.careerGoal) { toast('Please enter your career goal', 'error'); return; }
  }

  setLoading(btn, true);
  const stepData = currentStep === 1 ? { skills: data.skills } : currentStep === 2 ? { interests: data.interests } : currentStep === 3 ? { careerGoal: data.careerGoal, experience: data.experience } : currentStep === 4 ? { targetCompanies: data.targetCompanies } : {};
  await post('/users/onboarding', { step: currentStep, data: stepData });
  setLoading(btn, false);

  if (currentStep === 5) {
    // Generate initial roadmap
    if (data.careerGoal) {
      await post('/roadmap/generate', { careerGoal: data.careerGoal, skills: data.skills, experience: data.experience, duration: 12 });
    }
    window.location.href = '/pages/dashboard.html';
    return;
  }
  currentStep++;
  renderStep();
}

function prevStep() { if (currentStep > 1) { currentStep--; renderStep(); } }

renderStep();
</script>
</body>
</html>
